<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz JKKP 12</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:#fff;
    text-align:center;
}

.container {
    max-width:500px;
    margin:auto;
    background:rgba(0,0,0,0.3);
    padding:20px;
    border-radius:12px;
}

input {
    width:90%;
    padding:10px;
    margin:5px;
    border-radius:6px;
    border:none;
}

button {
    width:90%;
    padding:12px;
    margin:8px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.default { background:#fff; color:#2a5298; }
.correct { background:#4CAF50; color:#fff; }
.wrong { background:#f44336; color:#fff; }

#nextBtn {
    display:none;
    background:orange;
    color:#000;
}

.logo {
    width:80px;
    margin:5px;
}

/* Animasi BETUL */
@keyframes flash {
    0% { opacity:1; transform:scale(1); }
    50% { opacity:0.3; transform:scale(1.2); }
    100% { opacity:1; transform:scale(1); }
}

/* Mobile */
@media(max-width:600px){
    h1 { font-size:20px; }
    button { font-size:14px; }
}
</style>
</head>

<body>

<div class="container">

<!-- AUDIO -->
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/mixkit-correct-answer-tone-2870.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-buzz-950.mp3"></audio>

<!-- INTRO -->
<div id="intro">
    <img src="logo_sarawak.png" class="logo">
    <img src="logo_jps.png" class="logo">

    <h1>Quiz JKKP 12</h1>

    <input id="name" placeholder="Nama"><br>
    <input id="dept" placeholder="Bahagian"><br>
    <input id="email" placeholder="Email"><br>

    <button onclick="startQuiz()">Mula</button>
</div>

<!-- QUIZ -->
<div id="quiz" style="display:none;">
    <h3 id="question"></h3>
    <div id="answers"></div>
    <div id="note"></div>
    <button id="nextBtn" onclick="nextQuestion()">Next</button>
    <p id="score"></p>
    <button id="downloadBtn" style="display:none;" onclick="downloadCSV()">Download CSV</button>
</div>

</div>

<script>

// ===== SOALAN =====
const quiz = [
{q:"Apakah fungsi utama JKKP?", a:["Menjaga keselamatan awam","Memastikan keselamatan dan kesihatan pekerja","Mengawal kesihatan pekerja sahaja","Mengenakan tindakan undang-undang"], correct:1},
{q:"JKKP berada di bawah kementerian mana?", a:["Kementerian Kerja Raya","Kementerian Sumber Manusia","Kementerian Perumahan","Kementerian Usahawan"], correct:1},
{q:"Apakah peranan utama JKKP dalam penguatkuasaan?", a:["Mengurus projek","Memastikan pematuhan keselamatan","Mengurus gaji pekerja","Mengawal harga bahan"], correct:1},
{q:"Skop tanggungjawab JKKP termasuk?", a:["Mengurus semua operasi projek","Memastikan pematuhan keselamatan & kesihatan","Mengawal aktiviti ekonomi pekerja","Mengurus kebajikan pekerja sahaja"], correct:1},
{q:"Perbezaan JKKP dan pengurusan projek?", a:["Tiada perbezaan","JKKP fokus keselamatan, projek pelaksanaan","JKKP urus pekerja","JKKP selepas projek siap"], correct:1},

{q:"Siapakah PATK1?", a:["Penyelia","Wakil klien","Pegawai keselamatan","Subkontraktor"], correct:1},
{q:"Peranan PATK1?", a:["Menyelia kerja","Mendaftarkan projek","Menguatkuasa","Urus peralatan"], correct:1},
{q:"Siapa betulkan maklumat?", a:["JKKP","PATK1","Kontraktor","Semua"], correct:1},
{q:"Kegagalan pematuhan?", a:["PATK1","Kontraktor","Kedua-dua","JKKP"], correct:2},
{q:"Peranan PATK1 fokus?", a:["Kerja fizikal","Pendaftaran projek","Keselamatan harian","Operasi"], correct:1},

{q:"Apa itu JKKP12?", a:["Dokumen keselamatan","Borang tapak bina","Audit","Permit"], correct:1},
{q:"Bila hantar?", a:["Selepas siap","Sebelum mula","Semasa audit","Selepas kemalangan"], correct:1},
{q:"Implikasi tak daftar?", a:["Tiada","Salah boleh tindakan","Bergantung","Amaran"], correct:1},
{q:"Siapa tanggungjawab keselamatan?", a:["Klien","Kontraktor","Penyelia","Semua"], correct:3},
{q:"Projek lanjut?", a:["Tiada","Update maklumat","Maklum sahaja","Tunggu"], correct:1},
{q:"Tujuan JKKP12?", a:["Rekod","Pemantauan","Audit","Bahan"], correct:1},
{q:"Lokasi berubah?", a:["Tiada","Update","Tunggu","Maklum"], correct:1},
{q:"Subkontraktor langgar?", a:["Subkontraktor","Kontraktor","Kedua","Tiada"], correct:2},
{q:"PTW ganti JKKP12?", a:["Ya","Tidak","Bergantung","Risiko tinggi"], correct:1},
{q:"Projek kecil?", a:["Ya","Tidak","Bergantung","Tempoh"], correct:1},

{q:"Tiada PPE?", a:["Pekerja","Kontraktor","Kedua","JKKP"], correct:2},
{q:"Audit tapak?", a:["Gaji","Keselamatan","Bahan","Semua"], correct:1},
{q:"Dokumen di tapak?", a:["JKKP12","PTW","Audit","Semua"], correct:3},
{q:"PATK1 gagal daftar?", a:["Tiada","Amaran","Tindakan","Tunggu"], correct:2},
{q:"Isi JKKP12?", a:["Maklumat projek","Pekerja","Lokasi","Peralatan"], correct:0},
{q:"Tamat tempoh?", a:["Tiada","Projek siap","6 bulan","Setahun"], correct:1},
{q:"Siapa semak?", a:["Pekerja","JKKP","PATK1 & JKKP","Awam"], correct:2},
{q:"Kemalangan?", a:["Biarkan","Lapor","Tunggu","Maklum"], correct:1},
{q:"Penalti?", a:["Tiada","Denda","Amaran","Kontraktor"], correct:1},
{q:"Siapa daftar?", a:["Klien","Pekerja","Sub","JKKP"], correct:0}
];

let current=0, score=0, answered=false, user={};

// ===== START =====
function startQuiz(){
    user.name=document.getElementById("name").value.trim();
    user.dept=document.getElementById("dept").value.trim();
    user.email=document.getElementById("email").value.trim();

    if(!user.name || !user.dept || !user.email){
        alert("Sila isi semua maklumat");
        return;
    }

    document.getElementById("intro").style.display="none";
    document.getElementById("quiz").style.display="block";
    loadQuestion();
}

const quizDiv=document.getElementById("quiz");

// ===== LOAD =====
function loadQuestion(){
    answered=false;
    note.innerHTML="";
    nextBtn.style.display="none";

    let q=quiz[current];
    question.innerHTML=(current+1)+". "+q.q;

    let arr=q.a.map((a,i)=>({text:a,i}));
    arr.sort(()=>Math.random()-0.5);

    q.shuffledIndex=arr.findIndex(x=>x.i===q.correct);

    answers.innerHTML="";
    arr.forEach((x,i)=>{
        answers.innerHTML+=`<button class="default" onclick="answer(${i})">${x.text}</button>`;
    });
}

// ===== ANSWER =====
function answer(i){
    if(answered) return;
    answered=true;

    let q=quiz[current];
    let btns=document.querySelectorAll("#answers button");

    btns.forEach((b,index)=>{
        if(index===q.shuffledIndex) b.classList.add("correct");
        if(index===i && i!==q.shuffledIndex) b.classList.add("wrong");
    });

    if(i===q.shuffledIndex){
        score++;
        correctSound.play();

        note.innerHTML="<div style='font-size:24px;color:#00ff00;animation:flash 0.6s 3;'>🎉 BETUL!!!</div>";
    } else {
        wrongSound.play();
    }

    nextBtn.style.display="block";
}

// ===== NEXT =====
function nextQuestion(){
    current++;
    if(current<quiz.length){
        loadQuestion();
    } else {
        showResult();
    }
}

// ===== RESULT =====
function showResult(){
    question.innerHTML="🎯 Quiz Tamat!";
    answers.innerHTML="";
    nextBtn.style.display="none";

    let percent=(score/quiz.length)*100;
    let msg="";

    if(percent>=80){ msg="🏆 TAHNIAH!"; confetti(); }
    else if(percent>=50){ msg="👍 Baik!"; }
    else{ msg="💡 Cuba Lagi!"; }

    scoreEl.innerHTML=`${msg}<br>${score}/${quiz.length}`;
    downloadBtn.style.display="block";
}

// ===== CONFETTI =====
function confetti(){
    for(let i=0;i<80;i++){
        let d=document.createElement("div");
        d.style.position="fixed";
        d.style.width="8px";
        d.style.height="8px";
        d.style.background=`hsl(${Math.random()*360},100%,50%)`;
        d.style.left=Math.random()*100+"vw";
        d.style.top="0";
        document.body.appendChild(d);

        d.animate([
            {transform:"translateY(0)"},
            {transform:`translateY(${window.innerHeight}px)`}
        ],{duration:2000+Math.random()*2000});

        setTimeout(()=>d.remove(),3000);
    }
}

// ===== CSV =====
function downloadCSV(){
    let csv="Nama,Bahagian,Email,Markah\n";
    csv+=`${user.name},${user.dept},${user.email},${score}/${quiz.length}`;
    let a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURI(csv);
    a.download="result.csv";
    a.click();
}
</script>

</body>
</html>
