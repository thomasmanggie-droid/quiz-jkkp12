<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan JKKP 12 - Mini E-Learning</title>
<style>
/* ===== Reset & Base ===== */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family: 'Arial', sans-serif; background: #f0f4f8; color:#333;}
.container{max-width:900px;margin:20px auto;background:white;padding:25px;border-radius:12px;box-shadow:0 0 15px rgba(0,0,0,0.1);}

/* ===== Header ===== */
header{text-align:center;background:#004d40;color:white;padding:20px;border-radius:12px 12px 0 0;position:relative;}
header img{height:50px;margin:0 10px;vertical-align:middle;}
header h1{margin:10px 0;font-size:24px;}
header p{opacity:0.85;font-size:14px;}
.icon-header{position:absolute;top:15px;right:15px;display:flex;gap:10px;}
.icon-header img{height:35px;}

/* ===== Intro / Registration ===== */
#intro{padding:20px;}
#intro p{margin-bottom:15px;font-size:14px;}
#intro input{width:100%;padding:10px;margin:5px 0 15px 0;border-radius:6px;border:1px solid #ccc;}
#intro button{padding:12px 25px;border:none;border-radius:8px;background:#00796b;color:white;cursor:pointer;font-size:16px;transition:0.3s;}
#intro button:hover{background:#004d40;}

/* ===== Quiz ===== */
.quiz-section{display:none;padding:10px;}
.question{background:#e8f5e9;border-left:6px solid #00796b;padding:15px;margin-bottom:15px;border-radius:8px;box-shadow:0 0 5px rgba(0,0,0,0.05);}
.options button{
    display:block;width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px;background:#cfd8dc;color:#333;font-size:14px;cursor:pointer;transition:0.3s;
}
.options button:hover{background:#b0bec5;}
.options button.correct{background:#4caf50;color:white;animation:flash 0.5s;}
.options button.wrong{background:#f44336;color:white;}
@keyframes flash{0%{transform:scale(1);}50%{transform:scale(1.2);}100%{transform:scale(1);}}

/* Next button */
.next-btn{margin-top:15px;padding:12px 25px;background:#00796b;color:white;border:none;border-radius:8px;cursor:pointer;transition:0.3s;font-size:16px;}
.next-btn:hover{background:#004d40;}

/* ===== Result ===== */
#result{text-align:center;display:none;}
#score{font-size:18px;margin-bottom:15px;}

/* ===== Confetti ===== */
.confetti{position:fixed;width:100%;height:100%;top:0;left:0;pointer-events:none;z-index:999;}

/* ===== Responsive ===== */
@media(max-width:600px){
    header h1{font-size:20px;}
    #intro input,#intro button,.options button,.next-btn{font-size:14px;}
}
</style>
</head>
<body>

<header>
    <img src="logo_sarawak.png" alt="Logo Sarawak">
    <img src="logo_jps.png" alt="Logo JPS">
    <h1>Latihan JKKP 12 - Pendaftaran Tapak Bina</h1>
    <p>Jabatan Pengairan & Saliran Sarawak</p>
</header>

<div class="container">
    <div id="intro">
        <h2>Selamat Datang</h2>
        <p>Latihan ini bertujuan meningkatkan kefahaman pegawai berkaitan pendaftaran tapak bina (JKKP 12), peranan PATK1 serta pematuhan keselamatan dan kesihatan pekerjaan.</p>
        <form id="regForm">
            <label>Nama:</label>
            <input type="text" id="name" required>
            <label>Bahagian:</label>
            <input type="text" id="department" required>
            <label>Email:</label>
            <input type="email" id="email" required>
            <button type="button" onclick="startQuiz()">Mula Latihan</button>
        </form>
    </div>

    <div class="quiz-section" id="quiz">
        <div class="question">
            <h3 id="questionText"></h3>
            <div class="options" id="options"></div>
        </div>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Soalan Seterusnya</button>
    </div>

    <div class="quiz-section" id="result">
        <h2 id="score"></h2>
        <button onclick="restartQuiz()">Ulang Latihan</button>
    </div>
</div>

<div class="confetti" id="confetti"></div>

<script>
// ===== Data Soalan 30 =====
const quiz=[
    {q:"Apakah tujuan utama JKKP 12 dalam projek pembinaan?", a:["Memastikan pematuhan keselamatan & kesihatan pekerja","Merekod kewangan projek","Memantau jadual kerja","Menilai prestasi kontraktor"], correct:0},
    {q:"Siapakah yang bertanggungjawab mendaftar tapak bina dalam MyKKP?", a:["Klien / pemilik projek","Subkontraktor","JKKP","Penyelia tapak"], correct:0},
    {q:"Apakah peranan PATK1 dalam MyKKP?", a:["Mendaftar projek dan kemas kini maklumat","Memantau kerja harian sahaja","Menguatkuasa undang-undang","Menyelia keselamatan pekerja secara fizikal"], correct:0},
    {q:"Jika berlaku pelanggaran keselamatan di tapak bina, siapakah boleh dikenakan tindakan?", a:["Kontraktor & subkontraktor","Hanya kontraktor utama","Hanya PATK1","Tiada siapa"], correct:0},
    {q:"Apakah tindakan jika lokasi projek berubah daripada asal JKKP 12?", a:["Kemas kini dalam sistem","Tiada tindakan","Hanya maklumkan kepada pekerja","Tunggu arahan JKKP"], correct:0},
    {q:"Pendaftaran JKKP 12 wajib dibuat sebelum?", a:["Kerja pembinaan bermula","Projek siap","Audit JKKP","Kemalangan berlaku"], correct:0},
    {q:"Siapakah yang memantau pematuhan keselamatan di tapak bina?", a:["Semua pihak terlibat","Hanya kontraktor","Hanya pekerja","Tiada siapa"], correct:0},
    {q:"Jika projek berskala kecil, adakah JKKP 12 diperlukan?", a:["Ya, semua projek perlu didaftar","Tidak, hanya projek besar","Bergantung tempoh projek","Bergantung pekerja"], correct:0},
    {q:"Apakah risiko memulakan kerja tanpa pendaftaran JKKP 12?", a:["Tindakan undang-undang","Tiada risiko","Hanya amaran","Perlu pembetulan dalaman"], correct:0},
    {q:"Apakah makna PATK1?", a:["Wakil pendaftaran projek di MyKKP","Penyelia tapak","Pegawai JKKP","Kontraktor"], correct:0},
    {q:"Jika subkontraktor langgar keselamatan, siapa boleh dikenakan tindakan?", a:["Subkontraktor & kontraktor utama","Subkontraktor sahaja","Kontraktor sahaja","Tiada tindakan"], correct:0},
    {q:"Bilakah JKKP 12 perlu dikemas kini?", a:["Jika info projek berubah","Setiap bulan","Hanya audit","Tiada perlu"], correct:0},
    {q:"Apakah tujuan Permit to Work (PTW)?", a:["Kerja berisiko tinggi sahaja","Gantikan JKKP12","Memantau kewangan projek","Hanya untuk kontraktor"], correct:0},
    {q:"Siapakah bertanggungjawab keselamatan pekerja harian?", a:["Kontraktor & PATK1","Hanya JKKP","Hanya klien","Tiada siapa"], correct:0},
    {q:"Apa risiko jika JKKP12 tidak dikemas kini?", a:["Tindakan undang-undang","Tiada risiko","Amaran sahaja","Hanya laporan dalaman"], correct:0},
    {q:"Contoh situasi: Projek pindah lokasi, siapa perlu kemas kini?", a:["PATK1 dalam MyKKP","JKKP sahaja","Kontraktor","Subkontraktor"], correct:0},
    {q:"Jika pekerja cedera di tapak bina, siapa laporan?", a:["Kontraktor utama & PATK1","Hanya pekerja","JKKP","Subkontraktor"], correct:0},
    {q:"Bagaimana memastikan projek patuh keselamatan?", a:["Daftar JKKP12 & ikut prosedur","Hanya pantau pekerja","Hanya audit","Tiada tindakan"], correct:0},
    {q:"Jika projek tamat sebelum semak JKKP, apa tindakan?", a:["Laporkan & lengkapkan rekod","Tiada tindakan","Hanya simpan dokumen dalaman","Hanya amaran"], correct:0},
    {q:"Situasi: Subkontraktor abaikan PTW, apa langkah?", a:["Kontraktor & PATK1 ambil tindakan","Tiada tindakan","JKKP sahaja","Amaran pekerja"], correct:0},
    {q:"Situasi: Audit tiba-tiba, PATK1 tidak hadir, apa tindakan?", a:["Kontraktor bertanggungjawab","Tiada tindakan","Hanya pekerja","JKKP tanggungjawab"], correct:0},
    {q:"Situasi: Projek guna bahan bahaya, siapa patuhi SOP?", a:["Semua pihak di tapak","Hanya kontraktor","Hanya PATK1","Tiada siapa"], correct:0},
    {q:"Situasi: Projek lewat pendaftaran, akibat?", a:["Tindakan undang-undang & amaran","Tiada risiko","Hanya laporan dalaman","Tunggu kelulusan JKKP"], correct:0},
    {q:"Situasi: PATK1 baru ambil alih projek, tindakan pertama?", a:["Semak & kemas kini JKKP12","Mula kerja terus","Hanya pantau pekerja","Tiada tindakan"], correct:0},
    {q:"Situasi: Projek besar & ramai subkontraktor, siapa koordinasi keselamatan?", a:["Kontraktor utama & PATK1","Hanya PATK1","JKKP sahaja","Tiada siapa"], correct:0},
    {q:"Situasi: Pekerja melanggar PPE, tindakan?", a:["Peringatan & catatan","Tiada tindakan","Tindakan JKKP","Hanya kontraktor"], correct:0},
    {q:"Situasi: Kerja malam tanpa lampu, siapa patuhi SOP?", a:["Kontraktor & PATK1","Tiada tindakan","Hanya JKKP","Pekerja"], correct:0}
];

let current=0, score=0;

function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
}

function startQuiz(){
    let n=document.getElementById("name").value.trim();
    let d=document.getElementById("department").value.trim();
    let e=document.getElementById("email").value.trim();
    if(!n||!d||!e){alert("Sila isi semua maklumat"); return;}
    document.getElementById("intro").style.display="none";
    document.getElementById("quiz").style.display="block";
    shuffleArray(quiz);
    showQuestion();
}

function showQuestion(){
    document.getElementById("nextBtn").style.display="none";
    let q=quiz[current];
    document.getElementById("questionText").innerText=(current+1)+". "+q.q;
    let optionsDiv=document.getElementById("options");
    optionsDiv.innerHTML="";
    let optArray=q.a.map((t,i)=>({text:t,index:i}));
    shuffleArray(optArray);
    optArray.forEach(o=>{
        let btn=document.createElement("button");
        btn.innerText=o.text;
        btn.onclick=()=>checkAnswer(o.index,btn);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(idx,btn){
    let q=quiz[current];
    let buttons=document.querySelectorAll(".options button");
    buttons.forEach(b=>b.disabled=true);
    if(idx==q.correct){
        btn.classList.add("correct");
        score++;
    }else{
        btn.classList.add("wrong");
        buttons[q.correct].classList.add("correct");
    }
    document.getElementById("nextBtn").style.display="block";
}

function nextQuestion(){
    current++;
    if(current<quiz.length) showQuestion();
    else showResult();
}

function showResult(){
    document.getElementById("quiz").style.display="none";
    document.getElementById("result").style.display="block";
    let percent=Math.round(score/quiz.length*100);
    let msg="", remark="";
    if(percent>=80){msg="🏆 TAHNIAH!"; remark="Tahap kefahaman sangat baik."; confettiEffect();}
    else if(percent>=50){msg="👍 MEMUASKAN"; remark="Tahap kefahaman sederhana.";}
    else{msg="⚠️ PERLU PENAMBAHBAIKAN"; remark="Tahap kefahaman rendah.";}
    document.getElementById("score").innerHTML=`${msg}<br>Markah: ${score}/${quiz.length} (${percent}%)<br><br>${remark}`;
}

function restartQuiz(){current=0; score=0; document.getElementById("result").style.display="none"; document.getElementById("intro").style.display="block";}

function confettiEffect(){
    let conf=document.getElementById("confetti"); conf.innerHTML="";
    for(let i=0;i<100;i++){
        let span=document.createElement("span");
        span.style.position="absolute";
        span.style.width="10px"; span.style.height="10px";
        span.style.backgroundColor=['#ff0','#f00','#0f0','#0ff','#f0f'][Math.floor(Math.random()*5)];
        span.style.top=Math.random()*window.innerHeight+'px';
        span.style.left=Math.random()*window.innerWidth+'px';
        span.style.opacity=Math.random();
        conf.appendChild(span);
    }
    setTimeout(()=>{conf.innerHTML='';},3000);
}
</script>
</body>
</html>
