<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan JKKP 12 - Jabatan Pengairan & Saliran Sarawak</title>
<style>
body{
    font-family: Arial, sans-serif;
    background-color:#f5f5f5;
    margin:0; padding:0;
}
header{
    text-align:center;
    background-color:#004d40;
    color:white;
    padding:15px 0;
}
header img{
    height:60px;
    margin:0 10px;
}
.container{
    max-width:800px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h1,h2,h3{margin:10px 0;}
.quiz-section{display:none;}
.question{margin:20px 0;}
.options button{
    display:block;
    width:100%;
    margin:5px 0;
    padding:10px;
    border:none;
    border-radius:5px;
    background-color:#e0e0e0;
    cursor:pointer;
    transition:0.3s;
}
.options button.correct{background-color:#4caf50;color:white;animation:flash 0.5s;}
.options button.wrong{background-color:#f44336;color:white;}
@keyframes flash{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}
.next-btn{
    margin-top:15px;
    padding:10px 20px;
    background:#004d40;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
footer{text-align:center;font-size:12px;color:#777;margin-top:20px;}
.confetti{position:fixed;width:100%;height:100%;top:0;left:0;pointer-events:none;z-index:999;}
</style>
</head>
<body>

<header>
    <img src="logo_sarawak.png" alt="Logo Sarawak">
    <img src="logo_jps.png" alt="Logo Jabatan Pengairan & Saliran">
    <h1>Latihan JKKP 12 - Pendaftaran Tapak Bina</h1>
    <p>Jabatan Pengairan & Saliran Sarawak</p>
</header>

<div class="container">
    <div id="intro">
        <h2>Selamat Datang</h2>
        <p>Latihan ini bertujuan meningkatkan kefahaman pegawai berkaitan pendaftaran tapak bina (JKKP 12), peranan PATK1 serta pematuhan keselamatan dan kesihatan pekerjaan.</p>
        <form id="regForm">
            <label>Nama:</label><input type="text" id="name" required><br><br>
            <label>Bahagian:</label><input type="text" id="department" required><br><br>
            <label>Email:</label><input type="email" id="email" required><br><br>
            <button type="button" onclick="startQuiz()">Mula Latihan</button>
        </form>
    </div>

    <div class="quiz-section" id="quiz">
        <div class="question">
            <h3 id="questionText"></h3>
            <div class="options" id="options"></div>
        </div>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Soalan Seterusnya</button>
    </div>

    <div class="quiz-section" id="result">
        <h2 id="score"></h2>
        <button onclick="restartQuiz()">Ulang Latihan</button>
    </div>
</div>

<div class="confetti" id="confetti"></div>

<script>
// 30 soalan, jawapan logik & tricky, scatter nanti
const quiz=[
    // 1-5 Pengenalan JKKP
    {q:"Apakah tujuan utama JKKP 12 dalam projek pembinaan?", a:["Memastikan pematuhan keselamatan & kesihatan pekerja","Merekod kewangan projek","Memantau jadual kerja","Menilai prestasi kontraktor"], correct:0},
    {q:"Siapakah yang bertanggungjawab mendaftar tapak bina dalam MyKKP?", a:["Klien / pemilik projek","Subkontraktor","JKKP","Penyelia tapak"], correct:0},
    {q:"Apakah makna JKKP?", a:["Jabatan Keselamatan & Kesihatan Pekerjaan","Jawatankuasa Keselamatan Projek","Jadual Kerja Kontraktor","Jabatan Kontraktor Pusat"], correct:0},
    {q:"Apakah objektif pendaftaran JKKP 12?", a:["Memastikan projek mematuhi SOP keselamatan","Menilai prestasi pekerja","Memantau belanjawan projek","Hanya untuk audit"], correct:0},
    {q:"Bilakah pendaftaran JKKP 12 perlu dibuat?", a:["Sebelum kerja pembinaan bermula","Selepas projek siap","Hanya bila JKKP datang audit","Bila pekerja minta"], correct:0},
    
    // 6-10 Peranan PATK1
    {q:"Apakah peranan PATK1 dalam MyKKP?", a:["Mendaftar projek & kemas kini maklumat","Hanya memantau kerja harian","Menguatkuasa undang-undang","Menjadi kontraktor tapak"], correct:0},
    {q:"Jika projek pindah lokasi, apa tindakan PATK1?", a:["Kemas kini MyKKP & maklumkan JKKP","Tiada tindakan","Hanya amaran kepada pekerja","Menunggu kelulusan kontraktor"], correct:0},
    {q:"Siapakah yang memantau pematuhan keselamatan di tapak bina?", a:["Kontraktor utama & PATK1","Hanya JKKP","Hanya pekerja","Tiada siapa"], correct:0},
    {q:"PATK1 perlu kemas kini JKKP 12 bila?", a:["Apabila info projek berubah","Setiap minggu","Setiap bulan","Hanya semasa audit"], correct:0},
    {q:"Apakah tindakan PATK1 jika subkontraktor langgar SOP?", a:["Ambil tindakan & rekod dalam MyKKP","Tiada tindakan","Hanya amaran","Laporkan bulan depan"], correct:0},

    // 11-20 Akta & keperluan JKKP12
    {q:"Apakah risiko memulakan kerja tanpa pendaftaran JKKP12?", a:["Tindakan undang-undang & denda","Tiada risiko","Amaran sahaja","Pembetulan dalaman sahaja"], correct:0},
    {q:"Apakah tujuan Permit to Work (PTW)?", a:["Memastikan kerja berisiko tinggi dipantau","Gantikan JKKP12","Memantau kewangan projek","Hanya untuk audit"], correct:0},
    {q:"Siapakah bertanggungjawab keselamatan pekerja harian?", a:["Kontraktor & PATK1","Hanya JKKP","Hanya klien","Tiada siapa"], correct:0},
    {q:"Apa risiko jika JKKP12 tidak dikemas kini?", a:["Tindakan undang-undang & audit","Tiada risiko","Amaran sahaja","Hanya laporan dalaman"], correct:0},
    {q:"Apakah tindakan bila pekerja cedera di tapak bina?", a:["Lapor & rekod dalam MyKKP","Tiada tindakan","Hanya simpan rekod dalaman","Amaran kepada kontraktor sahaja"], correct:0},
    {q:"Jika projek guna bahan berbahaya, siapa patuh SOP?", a:["Semua pihak di tapak","Hanya kontraktor","Hanya PATK1","Tiada siapa"], correct:0},
    {q:"Apakah maksud PATK1?", a:["Wakil pendaftaran projek di MyKKP","Pegawai JKKP","Subkontraktor","Kontraktor"], correct:0},
    {q:"Jika projek lewat daftar JKKP, akibat?", a:["Tindakan undang-undang & amaran","Tiada risiko","Hanya laporan dalaman","Tunggu kelulusan JKKP"], correct:0},
    {q:"Situasi: Projek tamat sebelum semak JKKP, tindakan?", a:["Laporkan & lengkapkan rekod","Tiada tindakan","Hanya simpan dokumen","Amaran sahaja"], correct:0},
    {q:"Situasi: Subkontraktor abaikan PTW, langkah?", a:["Kontraktor & PATK1 ambil tindakan","Tiada tindakan","JKKP sahaja","Amaran pekerja"], correct:0},

    // 21-25 Situasi sebenar (case-based)
    {q:"Situasi: Projek pindah lokasi, siapa perlu kemas kini MyKKP?", a:["PATK1","JKKP sahaja","Kontraktor","Subkontraktor"], correct:0},
    {q:"Situasi: Audit tiba-tiba, PATK1 tidak hadir, apa tindakan?", a:["Kontraktor bertanggungjawab","Tiada tindakan","Hanya pekerja","JKKP tanggungjawab"], correct:0},
    {q:"Situasi: Projek guna bahan bahaya, langkah keselamatan?", a:["Semua pihak ikut SOP","Hanya kontraktor","Hanya PATK1","Tiada siapa"], correct:0},
    {q:"Situasi: Pekerja langgar PPE, apa langkah?", a:["Peringatan & catatan","Tiada tindakan","Tindakan JKKP","Hanya kontraktor"], correct:0},
    {q:"Situasi: Kerja malam tanpa lampu, siapa patuhi SOP?", a:["Kontraktor & PATK1","Tiada tindakan","Hanya JKKP","Pekerja"], correct:0},

    // 26-30 Case-based tricky
    {q:"Case: Projek besar & ramai subkontraktor, siapa koordinasi keselamatan?", a:["Kontraktor utama & PATK1","Hanya PATK1","JKKP sahaja","Tiada siapa"], correct:0},
    {q:"Case: PATK1 baru ambil alih projek, tindakan pertama?", a:["Semak & kemas kini JKKP12","Mula kerja terus","Hanya pantau pekerja","Tiada tindakan"], correct:0},
    {q:"Case: Pendaftaran salah tarikh, akibat?", a:["Tindakan undang-undang & kemaskini","Tiada tindakan","Amaran dalaman","Hanya laporan kontraktor"], correct:0},
    {q:"Case: Subkontraktor lambat hadir kursus keselamatan, langkah?", a:["Jadual semula & catat dalam MyKKP","Tiada tindakan","Hanya amaran","Laporkan bulan depan"], correct:0},
    {q:"Case: Projek terjejas cuaca, SOP patuh?", a:["Semua pihak ikut prosedur & lapor PATK1","Hanya kontraktor","Tiada tindakan","Hanya pekerja"], correct:0}
];

let current=0;
let score=0;

function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
}

function startQuiz(){
    let n=document.getElementById("name").value.trim();
    let d=document.getElementById("department").value.trim();
    let e=document.getElementById("email").value.trim();
    if(!n||!d||!e){
        alert("Sila isi semua maklumat");
        return;
    }
    document.getElementById("intro").style.display="none";
    document.getElementById("quiz").style.display="block";
    shuffleArray(quiz);
    showQuestion();
}

let optArrayGlobal=[]; // untuk checkAnswer
function showQuestion(){
    document.getElementById("nextBtn").style.display="none";
    let q=quiz[current];
    document.getElementById("questionText").innerText=(current+1)+". "+q.q;
    let optionsDiv=document.getElementById("options");
    optionsDiv.innerHTML="";
    optArrayGlobal=q.a.map((t,i)=>({text:t,index:i}));
    shuffleArray(optArrayGlobal);
    optArrayGlobal.forEach(o=>{
        let btn=document.createElement("button");
        btn.innerText=o.text;
        btn.onclick=()=>checkAnswer(o,btn);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(optionObj, btn){
    let q=quiz[current];
    let buttons=document.querySelectorAll(".options button");
    buttons.forEach(b=>b.disabled=true);
    if(optionObj.index === q.correct){
        btn.classList.add("correct");
        btn.innerText+=" ✅ BETUL!!!";
        score++;
    }else{
        btn.classList.add("wrong");
        buttons.forEach(b=>{
            if(b.innerText === q.a[q.correct]) b.classList.add("correct");
        });
    }
    document.getElementById("nextBtn").style.display="block";
}

function nextQuestion(){
    current++;
    if(current<quiz.length){
        showQuestion();
    }else{
        showResult();
    }
}

function showResult(){
    document.getElementById("quiz").style.display="none";
    document.getElementById("result").style.display="block";
    let percent=Math.round(score/quiz.length*100);
    let msg="";
    let remark="";
    if(percent>=80){
        msg="🏆 TAHNIAH!";
        remark="Tahap kefahaman sangat baik. Anda menunjukkan penguasaan yang kukuh terhadap keperluan JKKP 12 dan pematuhan keselamatan.";
        confettiEffect();
    } else if(percent>=50){
        msg="👍 MEMUASKAN";
        remark="Tahap kefahaman sederhana. Disarankan untuk meneliti semula keperluan pendaftaran dan tanggungjawab pihak terlibat.";
    }else{
        msg="⚠️ PERLU PENAMBAHBAIKAN";
        remark="Tahap kefahaman masih rendah. Disarankan mengikuti semula latihan dan memahami keperluan asas JKKP 12.";
    }
    document.getElementById("score").innerHTML=`${msg}<br>Markah: ${score}/${quiz.length} (${percent}%)<br><br>${remark}`;
}

function restartQuiz(){
    current=0;
    score=0;
    document.getElementById("result").style.display="none";
    document.getElementById("intro").style.display="block";
}

function confettiEffect(){
    let conf=document.getElementById("confetti");
    conf.innerHTML="";
    for(let i=0;i<100;i++){
        let span=document.createElement("span");
        span.style.position="absolute";
        span.style.width="10px";
        span.style.height="10px";
        span.style.backgroundColor=['#ff0','#f00','#0f0','#0ff','#f0f'][Math.floor(Math.random()*5)];
        span.style.top=Math.random()*window.innerHeight+'px';
        span.style.left=Math.random()*window.innerWidth+'px';
        span.style.opacity=Math.random();
        conf.appendChild(span);
    }
    setTimeout(()=>{conf.innerHTML='';},3000);
}
</script>
</body>
</html>
